<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden; /* prevent body-level scrollbar */
  }

  .transactions {
    font: normal 13px arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .transactions__list {
    display: flex;
    flex-flow: column nowrap;
    overflow-y: auto;
    flex: 1 1 0;
    min-height: 0; /* allows flex child to shrink below its content height */
  }

  .transactions__list-row {
    display: flex;
    justify-content: space-between;
    border-top: 1px dotted #cccccc;
    padding-top: 1px;
    padding-bottom: 2px;
  }

  .transactions__list-row--dark {
    background-color: #f5f5f5;
  }

  .transactions__list-row--empty {
    border-top: 3px double #cccccc;
  }

  .transactions__list-row-head {
    width: 25%;
    text-align: left;
    margin-right: 3px;
  }

  .transactions__list-row-val {
    width: 75%;
    text-align: right;
  }

  .transactions__list-row-val--planned {
    color: red;
  }

  .transactions__list-row-val--not-planned {
    color: green;
  }

  .transactions__summary {
    flex-shrink: 0;
    font-size: 1.1em;
    color: red;
    border-top: 1px dashed #cccccc;
    padding: 6px 5px;
    display: none;
  }

  .transactions__controls {
    text-align: center;
    padding: 8px 0;
    border-top: 1px solid #cccccc;
    flex-shrink: 0;
  }

  .loading-label {
    font-size: 1.1em;
    padding-left: 5px;
    padding-top: 5px;
  }

  .error {
    display: flex;
    flex-flow: column nowrap;
  }

  .error-header {
    font-weight: bold;
    font-size: 1.1em;
    color: red;
  }

  .error-message {
    padding-top: 5px;
  }

  /* Spinner — used by the global loading label */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    border-radius: 50%;
    border: 2px solid #dddddd;
    border-top-color: #888888;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }

  .spinner--md {
    width: 14px;
    height: 14px;
    margin-right: 5px;
  }
</style>

<!-- Main markup -->
<div class="transactions">
  <div class="transactions__list"></div>
  <div class="transactions__summary"></div>
  <div class="transactions__controls">
    <button class="transactions__reload-btn">Reload</button>
  </div>
</div>

<!-- jQuery and jQuery UI scripts references -->
<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
<script src="//ajax.googleapis.com/ajax/libs/jqueryui/1.11.0/jquery-ui.min.js"></script>

<!-- Main script -->
<script>
$(function() {
  /****************
   * Declarations *
   ****************/
  const transactionsList = $('.transactions__list');
  const transactionsSummary = $('.transactions__summary');
  const reloadBtn = $('.transactions__reload-btn');

  const showLoadingLabel = () => {
    transactionsList.empty();
    transactionsSummary.hide();
    transactionsList.append('<div class="loading-label"><span class="spinner spinner--md"></span>Loading</div>');
  };

  const showTransactionsHistory = (transactionsHistoryData) => {
    transactionsList.empty();

    if (!transactionsHistoryData) {
      transactionsList.append('<div class="error"><div class="error-header">Error!</div><div class="error-message">Error getting transactions history data!</div></div>');
      reloadBtn.removeAttr('disabled');
      return;
    }

    if (!transactionsHistoryData.isSummaryBalanceSheet) {
      transactionsList.append('<div>Please switch to the <strong>"Summary Balance"</strong> tab</div>');
      reloadBtn.removeAttr('disabled');
      return;
    }

    let plannedPaymentsSum = 0;
    try {
      JSON.parse(transactionsHistoryData.json, (key, value) => {
        if (key === 'dateOfTransaction') {
          const date = new Date(value);
          return `${date.getUTCDate()}/${date.getUTCMonth() + 1}/${date.getUTCFullYear()}`;
        }
        return value;
      }).forEach((element, index, array) => {
        const comment = element.comment ?? 'n/a';
        const isPlanned = element.plannedPayment;
        const plannedPaymentVal = isPlanned ? 'Yes' : 'No';
        const plannedPaymentValStyle = isPlanned
          ? 'transactions__list-row-val--planned'
          : 'transactions__list-row-val--not-planned';

        if (isPlanned) plannedPaymentsSum += element.value;

        let html = `
          <div class="transactions__list-row transactions__list-row--dark">
            <div class="transactions__list-row-head"><strong>Date:</strong></div>
            <div class="transactions__list-row-val">${element.dateOfTransaction}</div>
          </div>
          <div class="transactions__list-row">
            <div class="transactions__list-row-head"><strong>Planned:</strong></div>
            <div class="transactions__list-row-val ${plannedPaymentValStyle}">${plannedPaymentVal}</div>
          </div>
          <div class="transactions__list-row transactions__list-row--dark">
            <div class="transactions__list-row-head"><strong>Comment:</strong></div>
            <div class="transactions__list-row-val">${comment}</div>
          </div>
          <div class="transactions__list-row">
            <div class="transactions__list-row-head"><strong>Value:</strong></div>
            <div class="transactions__list-row-val">${element.value}</div>
          </div>`;

        if (index + 1 < array.length) {
          html += '<div class="transactions__list-row--empty">&nbsp;</div>';
        }

        transactionsList.append(html);
      });
    } catch (err) {
      transactionsList.empty();
      transactionsList.append(`
        <div class="error">
          <div class="error-header">Error!</div>
          <div class="error-message">Please check cell <strong>${transactionsHistoryData.jsonCellA1Notation}</strong> on <strong>Transactions History</strong> tab</div>
          <div class="error-message">${err}</div>
        </div>`);
    }

    if (plannedPaymentsSum > 0) {
      transactionsSummary.html(`Current Planned Payments sum is: <strong>${plannedPaymentsSum.toFixed(2)}</strong>`);
      transactionsSummary.show();
    }

    reloadBtn.removeAttr('disabled');
  };

  const loadTransactionsHistory = () => {
    reloadBtn.attr('disabled', 'disabled');
    showLoadingLabel();

    google.script.run
      .withSuccessHandler(showTransactionsHistory)
      .withFailureHandler(() => reloadBtn.removeAttr('disabled'))
      .getTransactionsHistoryData();
  };

  reloadBtn.click(loadTransactionsHistory);

  /***************
   * Start point *
   ***************/
  loadTransactionsHistory();
});
</script>
